workflows:
  android-workflow:
    name: Flutter Android Build
    max_build_duration: 60

    environment:
      flutter: stable
      java: 17

    cache:
      cache_paths:
        - ~/.pub-cache
        - android/.gradle

    scripts:
      - name: Clean Flutter
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Clean Android Gradle
        script: |
          cd android
          ./gradlew clean
          cd ..

      - name: Fix dependencies (safety step)
        script: |
          flutter pub deps

      - name: Analyze (optional)
        script: |
          flutter analyze || true

      - name: Build APK (Release)
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
