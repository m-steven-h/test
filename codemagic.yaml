workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60

    environment:
      flutter: stable
      java: 17

    scripts:
      # 🧹 تنظيف شامل
      - name: Clean project
        script: |
          flutter clean
          rm -rf .dart_tool
          rm -rf pubspec.lock

      # 📦 تحميل dependencies
      - name: Get packages
        script: |
          flutter pub get

      # 🔥 إصلاح local.properties (مهم جدًا لحل NDK issues)
      - name: Fix Android properties
        script: |
          rm -rf android/local.properties
          echo "flutter.sdk=/usr/local/flutter" > android/local.properties
          echo "sdk.dir=/usr/local/android-sdk" >> android/local.properties

      # ⚠️ تعطيل lint crash (حل مشكلة RescheduleReceiver)
      - name: Fix lint issues
        script: |
          echo "android.lint.checkReleaseBuilds=false" >> android/gradle.properties
          echo "android.lint.abortOnError=false" >> android/gradle.properties

      # ⚙️ Build APK
      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
