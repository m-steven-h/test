workflows:
  android-release:
    name: Android Release Build

    max_build_duration: 60

    environment:
      flutter: stable
      java: 17
      android_ndk: 27.0.12077973

    scripts:
      # 🔥 نصلّح مشكلة local.properties نهائي
      - name: Fix local.properties
        script: |
          rm -rf android/local.properties
          echo "flutter.sdk=/usr/local/flutter" > android/local.properties
          echo "sdk.dir=/usr/local/android-sdk" >> android/local.properties

      # 🧹 تنظيف المشروع
      - name: Clean project
        script: |
          flutter clean

      # 📦 تحميل dependencies
      - name: Get packages
        script: |
          flutter pub get

      # ⚙️ بناء التطبيق
      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
