scripts:
  - name: Build Android APK
    script: |
      # إعداد NDK
      echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      echo "ndk.dir=$ANDROID_NDK" >> android/local.properties
      
      # بناء التطبيق
      cd android
      chmod +x gradlew
      ./gradlew clean
      cd ..
      flutter build apk --release
