workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60

    environment:
      flutter: stable
      java: 17

    scripts:
      # 🧹 تنظيف المشروع
      - name: Clean project
        script: |
          flutter clean

      # 📦 تحميل packages
      - name: Get dependencies
        script: |
          flutter pub get

      # 🔥 إصلاح local.properties (مهم جدًا)
      - name: Fix local.properties
        script: |
          rm -rf android/local.properties
          echo "flutter.sdk=/usr/local/flutter" > android/local.properties
          echo "sdk.dir=/usr/local/android-sdk" >> android/local.properties

      # ⚙️ Build APK
      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
