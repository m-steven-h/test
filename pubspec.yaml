name: notification_app
description: تطبيق تجريبي للإشعارات في Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # للإشعارات المحلية
  flutter_local_notifications: ^17.0.0
  
  # لإدارة الوقت والتاريخ
  timezone: ^0.9.2
  
  # لاختيار الوقت والتاريخ
  intl: ^0.19.0
  
  # لإدارة حالة التطبيق
  provider: ^6.1.1
  
  # لحفظ البيانات محلياً
  shared_preferences: ^2.2.2
  
  # لإضافة أيقونات
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true